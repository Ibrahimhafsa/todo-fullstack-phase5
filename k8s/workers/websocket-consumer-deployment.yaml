---
# WebSocket Consumer Worker Deployment
# Consumes TaskUpdated events and broadcasts real-time updates via WebSocket
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-consumer
  namespace: default
  labels:
    app: websocket-consumer
    component: event-consumer
    worker-type: websocket
spec:
  replicas: 2  # HA with 2 replicas for concurrent WebSocket connections
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: websocket-consumer
  template:
    metadata:
      labels:
        app: websocket-consumer
        component: event-consumer
        worker-type: websocket
      annotations:
        # Dapr sidecar injection
        dapr.io/enabled: "true"
        dapr.io/app-id: "websocket-consumer"
        dapr.io/app-port: "8004"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: default
      containers:
      - name: websocket-consumer
        image: todo-backend:1.0
        imagePullPolicy: Never
        command: ["python", "-m", "app.workers.websocket_consumer"]
        ports:
        - name: http
          containerPort: 8004
          protocol: TCP
        - name: websocket
          containerPort: 8005
          protocol: TCP
        env:
        # Logging
        - name: LOG_LEVEL
          value: "INFO"

        # Database configuration (for user validation and session management)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: connection-string

        # Authentication
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: better-auth-secret

        # OpenAI
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key

        # WebSocket configuration
        # Phase 2.7: Simple in-memory broadcast to connected clients
        # Phase 7+: Redis for cross-instance connection tracking
        - name: WEBSOCKET_PORT
          value: "8005"

        - name: WEBSOCKET_STORE
          value: "memory"  # or "redis" for Phase 7+

        # Dapr configuration
        - name: DAPR_PUBSUB_NAME
          value: "kafka-pubsub"

        - name: DAPR_HTTP_PORT
          value: "3500"

        # Consumer group for Kafka
        - name: CONSUMER_GROUP
          value: "websocket-consumer-group"

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

      affinity:
        # Pod anti-affinity for distributed deployment
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - websocket-consumer
              topologyKey: kubernetes.io/hostname

---
# WebSocket Consumer Service
apiVersion: v1
kind: Service
metadata:
  name: websocket-consumer
  namespace: default
  labels:
    app: websocket-consumer
    component: event-consumer
spec:
  selector:
    app: websocket-consumer
  type: ClusterIP
  ports:
  - name: http
    port: 8004
    targetPort: http
    protocol: TCP
  - name: websocket
    port: 8005
    targetPort: websocket
    protocol: TCP
