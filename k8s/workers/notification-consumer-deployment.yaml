---
# Notification Consumer Worker Deployment
# Consumes ReminderTriggered events and sends notifications
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer
  namespace: default
  labels:
    app: notification-consumer
    component: event-consumer
    worker-type: notification
spec:
  replicas: 2  # HA with 2 replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-consumer
  template:
    metadata:
      labels:
        app: notification-consumer
        component: event-consumer
        worker-type: notification
      annotations:
        # Dapr sidecar injection
        dapr.io/enabled: "true"
        dapr.io/app-id: "notification-consumer"
        dapr.io/app-port: "8002"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: default
      containers:
      - name: notification-consumer
        image: todo-backend:1.0
        imagePullPolicy: Never
        command: ["python", "-m", "app.workers.notification_consumer"]
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        env:
        # Logging
        - name: LOG_LEVEL
          value: "INFO"

        # Notification channel configuration
        # Comma-separated list of channels: in_app, email, push, sms
        # Phase 2.7: Only in_app is implemented (console logging)
        - name: NOTIFICATION_CHANNELS
          value: "in_app"

        # Email service configuration (placeholder for Phase 7+)
        - name: EMAIL_SERVICE
          value: "console"  # or "sendgrid", "smtp", etc.

        # Push notification service (placeholder for Phase 7+)
        - name: PUSH_SERVICE
          value: "console"  # or "firebase", "apns", etc.

        # Dapr configuration
        - name: DAPR_PUBSUB_NAME
          value: "kafka-pubsub"

        - name: DAPR_HTTP_PORT
          value: "3500"

        # Consumer group for Kafka
        - name: CONSUMER_GROUP
          value: "notification-consumer-group"

        # OpenAI
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

      affinity:
        # Pod anti-affinity for distributed deployment
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - notification-consumer
              topologyKey: kubernetes.io/hostname

---
# Notification Consumer Service
apiVersion: v1
kind: Service
metadata:
  name: notification-consumer
  namespace: default
  labels:
    app: notification-consumer
    component: event-consumer
spec:
  selector:
    app: notification-consumer
  type: ClusterIP
  ports:
  - name: http
    port: 8002
    targetPort: http
    protocol: TCP
