---
# Recurring Task Consumer Worker Deployment
# Consumes TaskCompleted events and generates next instances for recurring tasks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recurring-consumer
  namespace: default
  labels:
    app: recurring-consumer
    component: event-consumer
    worker-type: recurring
spec:
  replicas: 2  # HA with 2 replicas for parallelism
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: recurring-consumer
  template:
    metadata:
      labels:
        app: recurring-consumer
        component: event-consumer
        worker-type: recurring
      annotations:
        # Dapr sidecar injection
        dapr.io/enabled: "true"
        dapr.io/app-id: "recurring-consumer"
        dapr.io/app-port: "8001"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: default
      containers:
      - name: recurring-consumer
        image: todo-backend:1.0
        imagePullPolicy: Never
        command: ["python", "-m", "app.workers.recurring_consumer"]
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        env:
        # Logging
        - name: LOG_LEVEL
          value: "INFO"

        # Database configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: connection-string

        # Authentication
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: better-auth-secret

        # OpenAI
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key

        # Dapr configuration
        - name: DAPR_PUBSUB_NAME
          value: "kafka-pubsub"

        - name: DAPR_HTTP_PORT
          value: "3500"

        # Consumer group for Kafka
        - name: CONSUMER_GROUP
          value: "recurring-consumer-group"

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

      affinity:
        # Pod anti-affinity for distributed deployment
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - recurring-consumer
              topologyKey: kubernetes.io/hostname

---
# Recurring Consumer Service
apiVersion: v1
kind: Service
metadata:
  name: recurring-consumer
  namespace: default
  labels:
    app: recurring-consumer
    component: event-consumer
spec:
  selector:
    app: recurring-consumer
  type: ClusterIP
  ports:
  - name: http
    port: 8001
    targetPort: http
    protocol: TCP
