---
# Dapr Secrets Component: Kubernetes Secrets
# This component configures Dapr to use Kubernetes secrets for credential management
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes-secrets
  namespace: default
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
    # Kubernetes namespace to read secrets from
    - name: kubernetesNamespace
      value: "default"

---
# RBAC Configuration for Dapr to access Kubernetes Secrets
# Allows Dapr sidecars to read secrets from the cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dapr-secrets-reader
  namespace: default
rules:
  # Allow reading secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
# Bind the role to the default service account (used by pod sidecars)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dapr-secrets-reader
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dapr-secrets-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default

---
# ClusterRole for reading secrets across namespaces (optional)
# Uncomment if your application needs to read secrets from other namespaces
