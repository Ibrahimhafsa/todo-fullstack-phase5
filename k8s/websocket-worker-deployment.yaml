# Kubernetes Deployment for WebSocket Consumer (Phase 7+)
# This service consumes task-updates and broadcasts to WebSocket clients
# Independent deployment with Dapr sidecar for Kafka integration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-consumer
  namespace: default
  labels:
    app: websocket-consumer
    phase: "7"
    component: event-consumer
spec:
  replicas: 2  # HA setup with 2 instances
  selector:
    matchLabels:
      app: websocket-consumer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: websocket-consumer
        phase: "7"
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "websocket-consumer"
        dapr.io/app-port: "8004"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: default
      containers:
      - name: websocket-consumer
        image: todo-backend:latest  # Build from backend Dockerfile
        imagePullPolicy: IfNotPresent

        # Run the WebSocket consumer service
        command: ["python"]
        args: ["-m", "app.workers.websocket_consumer"]

        ports:
        - name: app
          containerPort: 8004
          protocol: TCP
        - name: websocket
          containerPort: 8005
          protocol: TCP

        env:
        # Logging
        - name: LOG_LEVEL
          value: "INFO"

        # Dapr configuration
        - name: DAPR_PUBSUB_NAME
          value: "kafka"

        # WebSocket configuration (Phase 7+)
        - name: WEBSOCKET_PING_INTERVAL
          value: "30"  # Seconds

        - name: WEBSOCKET_PING_TIMEOUT
          value: "10"  # Seconds

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: websocket-consumer
  namespace: default
  labels:
    app: websocket-consumer
spec:
  selector:
    app: websocket-consumer
  type: ClusterIP
  ports:
  - name: app
    port: 8004
    targetPort: 8004
    protocol: TCP
  - name: websocket
    port: 8005
    targetPort: 8005
    protocol: TCP
