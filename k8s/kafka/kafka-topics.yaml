---
# Kafka Topics for Event Architecture
# These topics are created by the Strimzi entity operator based on KafkaTopic CRDs

# Task events: TaskCreated, TaskUpdated, TaskCompleted, TaskDeleted
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: todo-created
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: todo-updated
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: todo-reminders
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: todo-audit
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
